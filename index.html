<!DOCTYPE html>
<html>
<head>
<title>Government Soot Monitoring System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    background: #e8f5f9;
    margin: 0;
}

/* 🔵 WELCOME SCREEN */
#welcomeScreen {
    position: fixed;
    width: 100%;
    height: 100vh;
    background-color: #0b3d91;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    opacity: 1;
    transition: opacity 1.5s ease;
    overflow: hidden;
}

#welcomeScreen.fade-out {
    opacity: 0;
}

/* 💨 Smoke Effect */
.smoke {
    position: absolute;
    width: 220px;
    height: 220px;
    background: radial-gradient(circle, rgba(255,255,255,0.25) 0%, rgba(255,255,255,0.05) 60%, transparent 70%);
    border-radius: 50%;
    animation: smokeMove 6s infinite ease-in-out;
    filter: blur(25px);
}

.smoke:nth-child(1) {
    top: 45%;
    left: 48%;
}

.smoke:nth-child(2) {
    top: 50%;
    left: 52%;
    animation-delay: 3s;
}

@keyframes smokeMove {
    0% {
        transform: translateY(20px) scale(0.9);
        opacity: 0.3;
    }
    50% {
        transform: translateY(-40px) scale(1.2);
        opacity: 0.6;
    }
    100% {
        transform: translateY(-90px) scale(1.5);
        opacity: 0;
    }
}

/* Logo */
.main-logo {
    width: 220px;
    margin-bottom: 20px;
    z-index: 2;
    animation: zoomIn 1.5s ease;
}

@keyframes zoomIn {
    from {
        transform: scale(0.7);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}

#welcomeScreen h1 {
    color: white;
    font-size: 38px;
    font-weight: bold;
    letter-spacing: 2px;
    z-index: 2;
}

/* Top logo */
.top-logo img {
    width: 160px;
    margin-top: 15px;
}

/* Government Button */
.gov-btn {
    position: absolute;
    top: 15px;
    right: 20px;
    background: #d32f2f;
    color: white;
}

/* Containers */
.container {
    background: white;
    padding: 20px;
    width: 90%;
    max-width: 400px;
    margin: 80px auto;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    text-align: center;
    box-sizing: border-box;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    box-sizing: border-box;
}

button {
    padding: 10px 14px;
    margin: 8px 4px;
    border: none;
    border-radius: 6px;
    background: #0288d1;
    color: white;
    cursor: pointer;
    width: auto;
}

button:hover {
    background: #0277bd;
}

.hidden { display: none; }

 .popup-msg {
     position: fixed;
     bottom: 20px;
     left: 50%;
     transform: translateX(-50%);
     color: white;
     padding: 12px 20px;
     border-radius: 6px;
     font-size: 14px;
     z-index: 99999;
     box-shadow: 0 4px 10px rgba(0,0,0,0.3);
     animation: fadePopup 0.3s ease;
     min-width: 220px;
     text-align: center;
 }

 /* Popup Types */
 .popup-success { background: #2e7d32; }
 .popup-error { background: #d32f2f; }
 .popup-warning { background: #f9a825; }

@keyframes fadePopup {
    from { opacity: 0; transform: translateX(-50%) translateY(10px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

.good { color: green; font-weight: bold; }
.moderate { color: orange; font-weight: bold; }
.bad { color: red; font-weight: bold; }

table {
    margin: auto;
    border-collapse: collapse;
    width: 100%;
    max-width: 95%;
    overflow-x: auto;
    display: block;
}

table, th, td {
    border: 1px solid black;
    padding: 6px;
}

@media (max-width: 600px) {
    #welcomeScreen h1 {
        font-size: 24px;
        text-align: center;
        padding: 0 10px;
    }

    .main-logo {
        width: 150px;
    }

    .top-logo img {
        width: 120px;
    }

    .gov-btn {
        top: 10px;
        right: 10px;
        padding: 6px 10px;
        font-size: 12px;
    }
}
</style>
</head>

<body>

<!-- 🔵 Welcome Screen with Smoke -->
<div id="welcomeScreen">
    <div class="smoke"></div>
    <div class="smoke"></div>

    <img src="https://arnavkasbe18.github.io/Airdefender-X-/logo.png" class="main-logo" alt="SOOT-X Logo">
    <h1>Welcome to SOOT-X</h1>
</div>

<button class="gov-btn" onclick="showAdminLogin()">Government Access</button>

<div class="top-logo">
    <img src="https://arnavkasbe18.github.io/Airdefender-X-/logo.png" alt="SOOT-X Logo">
</div>

<div class="container" id="userSection">

    <h2>Vehicle Login</h2>
    <input type="text" id="vehicleNumber" placeholder="Enter Vehicle Number">
    <button onclick="userLogin()">User Login</button>

    <hr>

    <h3>Register Vehicle</h3>
    <input type="text" id="regVehicleNumber" placeholder="Vehicle Number (e.g. MH12XY1234)" maxlength="10" style="text-transform:uppercase">
    <input type="date" id="serviceDate">
    <button onclick="registerVehicle()">Register Vehicle</button>

</div>

<div class="container hidden" id="adminLoginSection">
    <h2>Government Admin Login</h2>
    <input type="text" id="adminId" placeholder="Admin ID">
    <input type="password" id="adminPass" placeholder="Password">
    <button onclick="adminLogin()">Login</button>
    <button onclick="closeAdminLogin()">Back</button>
</div>

<div id="userPortal" class="hidden" style="text-align:center;">
    <h2>User Vehicle Dashboard</h2>
    <div id="userDetails"></div>
    <button onclick="logout()">Logout</button>
</div>

<div id="adminPortal" class="hidden" style="text-align:center;">
    <h2>Government Admin Dashboard</h2>
    <table>
        <thead>
            <tr>
                <th>Vehicle No</th>
                <th>Soot %</th>
                <th>Status</th>
                <th>Service Date</th>
                <th>Next Due</th>
            </tr>
        </thead>
        <tbody id="adminTable"></tbody>
    </table>
    <br>
    <button onclick="logout()">Logout</button>
</div>

<script>

/* Smooth Fade Out */
window.onload = function() {
    setTimeout(function() {
        document.getElementById("welcomeScreen").classList.add("fade-out");

        setTimeout(function(){
            document.getElementById("welcomeScreen").style.display = "none";
        }, 1500);

    }, 2500);
};

let vehicles = JSON.parse(localStorage.getItem("vehicles")) || [];

function saveVehicles() {
    localStorage.setItem("vehicles", JSON.stringify(vehicles));
}

function showAdminLogin() {
    document.getElementById("userSection").classList.add("hidden");
    document.getElementById("adminLoginSection").classList.remove("hidden");
}

function closeAdminLogin() {
    document.getElementById("adminLoginSection").classList.add("hidden");
    document.getElementById("userSection").classList.remove("hidden");
}

function registerVehicle() {

    let number = document.getElementById("regVehicleNumber").value.trim().toUpperCase();
    let serviceDate = document.getElementById("serviceDate").value;

    if(number === "" || serviceDate === "") {
        showPopup("Please fill all fields properly.", "warning");
        return;
    }

    // Vehicle number format validation (e.g., MH12XY1234)
    let vehiclePattern = /^[A-Z]{2}[0-9]{2}[A-Z]{2}[0-9]{4}$/;

    if(!vehiclePattern.test(number)) {
        showPopup("Invalid Format! Example: MH12XY1234", "error");
        return;
    }

    if(vehicles.find(v => v.number === number)) {
        showPopup("Vehicle already registered!", "warning");
        return;
    }

    let soot = Math.floor(Math.random() * 100);

    let nextDue = new Date(serviceDate);
    nextDue.setMonth(nextDue.getMonth() + 6);

    vehicles.push({
        number,
        soot,
        serviceDate,
        nextDue: nextDue.toISOString().split("T")[0]
    });

    saveVehicles();
    showPopup("Vehicle Registered Successfully!", "success");
}

function userLogin() {

    let number = document.getElementById("vehicleNumber").value.trim().toUpperCase();
    let vehicle = vehicles.find(v => v.number === number);

    if(vehicle) {

        document.getElementById("userSection").classList.add("hidden");
        document.getElementById("userPortal").classList.remove("hidden");

        let status = getStatus(vehicle.soot);

        document.getElementById("userDetails").innerHTML = `
            <p><strong>Vehicle:</strong> ${vehicle.number}</p>
            <p><strong>Soot:</strong> ${vehicle.soot}%</p>
            <p><strong>Status:</strong> <span class="${status.class}">${status.text}</span></p>
            <p><strong>Last Service:</strong> ${vehicle.serviceDate}</p>
            <p><strong>Next Due:</strong> ${vehicle.nextDue}</p>
        `;

    } else {
        showPopup("Vehicle not registered or invalid number.", "error");
    }
}

function adminLogin() {

    let id = document.getElementById("adminId").value;
    let pass = document.getElementById("adminPass").value;

    if(id === "Admin-login" && pass === "Itsme") {

        document.getElementById("adminLoginSection").classList.add("hidden");
        document.getElementById("adminPortal").classList.remove("hidden");

        loadAdminData();

    } else {
        showPopup("Invalid Admin Credentials", "error");
    }
}

function getStatus(soot) {
    if(soot <= 40) return { text: "GOOD", class: "good" };
    if(soot <= 75) return { text: "MODERATE", class: "moderate" };
    return { text: "BAD - Service Required", class: "bad" };
}

function loadAdminData() {

    let table = document.getElementById("adminTable");
    table.innerHTML = "";

    vehicles.forEach(v => {

        let status = getStatus(v.soot);

        table.innerHTML += `
            <tr>
                <td>${v.number}</td>
                <td>${v.soot}%</td>
                <td class="${status.class}">${status.text}</td>
                <td>${v.serviceDate}</td>
                <td>${v.nextDue}</td>
            </tr>
        `;
    });
}

function showPopup(message, type = "error") {
    let popup = document.createElement("div");
    popup.className = "popup-msg";

    if(type === "success") popup.classList.add("popup-success");
    else if(type === "warning") popup.classList.add("popup-warning");
    else popup.classList.add("popup-error");

    popup.innerText = message;

    document.body.appendChild(popup);

    setTimeout(() => {
        popup.style.opacity = "0";
        setTimeout(() => popup.remove(), 300);
    }, 2500);
}

function logout() {
    location.reload();
}

</script>

</body>
</html>
